<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sudoku Game</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
}

h1 {
  margin-top: 20px;
}

#sudoku-board {
  display: grid;
  grid-template-columns: repeat(9, 50px);
  gap: 3px;
  justify-content: center;
  margin: 20px;
}

input {
  width: 50px;
  height: 50px;
  text-align: center;
  font-size: 18px;
  border: none;
  outline: none;
  transition: all 0.3s ease;
}

/* Grid borders */
input:nth-child(3n) {
  border-right: 2px solid black;
}
input:nth-child(n+19):nth-child(-n+27),
input:nth-child(n+46):nth-child(-n+54) {
  border-bottom: 2px solid black;
}

/* Focus animation */
input:focus {
  background: #ffd166;
  transform: scale(1.1);
}

/* Correct */
.correct {
  background: #06d6a0 !important;
  animation: pop 0.3s ease;
}

/* Wrong */
.wrong {
  background: #ef476f !important;
  animation: shake 0.3s;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
  100% { transform: translateX(0); }
}

button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  background: #ffd166;
  cursor: pointer;
  font-weight: bold;
  border-radius: 5px;
}
</style>

</head>
<body>

<h1>Sudoku Game</h1>

<div id="sudoku-board"></div>

<button onclick="checkSolution()">Check</button>
<button onclick="generateSudoku()">New Game</button>

<script>
const board = document.getElementById("sudoku-board");

let puzzle = [
  [5,3,"","",7,"","","",""],
  [6,"","",1,9,5,"","",""],
  ["",9,8,"","","","",6,""],
  [8,"","","",6,"","","",3],
  [4,"","",8,"",3,"","",1],
  [7,"","","",2,"","","",6],
  ["",6,"","","","",2,8,""],
  ["","","",4,1,9,"","",5],
  ["","","","",8,"","",7,9]
];

let solution = [
  [5,3,4,6,7,8,9,1,2],
  [6,7,2,1,9,5,3,4,8],
  [1,9,8,3,4,2,5,6,7],
  [8,5,9,7,6,1,4,2,3],
  [4,2,6,8,5,3,7,9,1],
  [7,1,3,9,2,4,8,5,6],
  [9,6,1,5,3,7,2,8,4],
  [2,8,7,4,1,9,6,3,5],
  [3,4,5,2,8,6,1,7,9]
];

function generateSudoku() {
  board.innerHTML = "";

  for (let i = 0; i < 9; i++) {
    for (let j = 0; j < 9; j++) {
      let input = document.createElement("input");
      input.setAttribute("maxlength", "1");

      if (puzzle[i][j] !== "") {
        input.value = puzzle[i][j];
        input.disabled = true;
        input.style.background = "#ccc";
      }

      board.appendChild(input);
    }
  }
}

function checkSolution() {
  let inputs = document.querySelectorAll("#sudoku-board input");

  inputs.forEach((input, index) => {
    let row = Math.floor(index / 9);
    let col = index % 9;

    if (!input.disabled) {
      if (parseInt(input.value) === solution[row][col]) {
        input.classList.remove("wrong");
        input.classList.add("correct");
      } else {
        input.classList.remove("correct");
        input.classList.add("wrong");
      }
    }
  });
}

generateSudoku();
</script>

</body>
</html>
